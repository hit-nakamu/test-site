<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKE | Hitoshi's Portfolio</title>
    <style>
        /* --- 既存の基本スタイル --- */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: #1a1a1a;
            color: #fff;
            padding: 40px 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.1em;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .intro-section {
            margin-bottom: 60px;
            text-align: center;
        }
        .intro-main-img-wrapper {
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .intro-main-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .intro-text {
            text-align: left;
            font-size: 1.05rem;
            color: #444;
            margin-bottom: 40px;
        }
        
        /* --- 一期一会・銘柄ギャラリーセクション --- */
        .section-title {
            font-size: 1.5rem;
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 10px;
            margin-top: 40px;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .gallery-item {
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s ease;
        }
        .gallery-item:hover {
            transform: translateY(-4px);
        }
        
        /* ポップアップ対象の画像（クリックできることを示すカーソルに） */
        .clickable-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            cursor: zoom-in; /* 虫眼鏡のプラスマークになります */
            transition: opacity 0.2s ease;
        }
        .clickable-img:hover {
            opacity: 0.9;
        }
        .item-info {
            padding: 15px;
        }
        .item-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .item-desc {
            font-size: 0.9rem;
            color: #666;
        }

        /* --- 【新規追加】画像ポップアップ（モーダル）のCSS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* 背景の暗さ */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none; /* 通常時はクリックをスルー */
            transition: opacity 0.3s ease;
        }
        /* モーダル表示中のクラス */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto; /* 表示時はクリックを有効に */
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        .modal-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-img {
            transform: scale(1); /* ふわっと少し大きくなって表示 */
        }
        /* 閉じる用のバツボタン */
        .modal-close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }
        .modal-close-btn:hover {
            color: #ccc;
        }
    </style>
</head>
<body>

    <header>
        <h1>お酒 / SAKE</h1>
    </header>

    <main>
        <!-- メイン導入部分 -->
        <div class="intro-section">
            <div class="intro-main-img-wrapper">
                <img src="IMG_7568.png" class="intro-main-img" alt="メイン画像">
            </div>
            <div class="intro-text">
                <p>日本酒やスコッチウイスキーを嗜む時間は、単に楽しむだけでなく、そのボトルの背景にある伝統やストーリーに触れ、料理とのペアリングを探求する贅沢な大人の知的冒険でもあります。夫婦でグラスを傾けながら交わす豊かな対話の時間を何より大切にしています。</p>
            </div>
        </div>

        <!-- 一期一会の出会い・銘柄セクション -->
        <h2 class="section-title">一期一会の出会い</h2>
        <p style="color: #555;">一期一会の出会いとして、これまで感動した日本の美酒たち。画像をタップすると拡大してご覧いただけます。</p>
        
        <div class="gallery-grid">
            <!-- 銘柄1: 十四代 -->
            <div class="gallery-item">
                <img src="juyondai.png" class="clickable-img" alt="十四代">
                <div class="item-info">
                    <div class="item-name">十四代</div>
                    <div class="item-desc">芳醇無比、日本酒の美しき頂点。</div>
                </div>
            </div>

            <!-- 銘柄2: 田酒 -->
            <div class="gallery-item">
                <img src="denshu.png" class="clickable-img" alt="田酒">
                <div class="item-info">
                    <div class="item-name">田酒</div>
                    <div class="item-desc">米の旨みが実直に伝わる、凛とした味わい。</div>
                </div>
            </div>

            <!-- 銘柄3: 鳳凰美田 -->
            <div class="gallery-item">
                <img src="hououbiden.png" class="clickable-img" alt="鳳凰美田">
                <div class="item-info">
                    <div class="item-name">鳳凰美田</div>
                    <div class="item-desc">華やかな吟醸香と、瑞々しい果実味。</div>
                </div>
            </div>

            <!-- 銘柄4: 花邑 -->
            <div class="gallery-item">
                <img src="hanamura.png" class="clickable-img" alt="花邑">
                <div class="item-info">
                    <div class="item-name">花邑</div>
                    <div class="item-desc">甘みと酸みの絶妙なバランス、上品な余韻。</div>
                </div>
            </div>
        </div>
    </main>

    <!-- 【新規追加】ポップアップ表示用のモーダル構造 -->
    <div class="modal-overlay" id="imageModal">
        <div class="modal-content">
            <button class="modal-close-btn" id="modalClose">&times;</button>
            <img src="" alt="拡大画像" class="modal-img" id="modalImg">
        </div>
    </div>

    <!-- 【新規追加】ポップアップを制御するJavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            const closeBtn = document.getElementById('modalClose');
            const clickableImages = document.querySelectorAll('.clickable-img');

            // 1. 各画像をクリックした時の処理
            clickableImages.forEach(img => {
                img.addEventListener('click', () => {
                    modalImg.src = img.src; // クリックされた画像のパスをモーダルにセット
                    modalImg.alt = img.alt;
                    modal.classList.add('active'); // モーダルを表示
                    document.body.style.overflow = 'hidden'; // 背景スクロールを禁止にする
                });
            });

            // 2. 閉じるボタンを押した時の処理
            closeBtn.addEventListener('click', closeModal);

            // 3. 背景（黒い部分）をクリックした時も閉じる処理
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });

            // モーダルを閉じる共通関数
            function closeModal() {
                modal.classList.remove('active');
                document.body.style.overflow = ''; // スクロール禁止を解除
                // アニメーションが終わる頃にsrcを空にして、次回開くときの一瞬の残像を防ぐ
                setTimeout(() => { modalImg.src = ''; }, 300);
            }
        });
    </script>

</body>
</html>
