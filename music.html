<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音楽 - 仁</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --accent-color: #c9a063;
            --card-bg: #1e1e1e;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }
        header {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            color: #ffffff;
            margin: 0;
            font-size: calc(1.5rem + 0.5vw);
            letter-spacing: 0.1em;
        }
        .back-link {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
        }
        main {
            max-width: 800px;
            margin: 10px auto 60px auto;
            padding: 0 15px;
            box-sizing: border-box;
        }
        section {
            background-color: var(--card-bg);
            padding: 35px;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h2 {
            color: #ffffff;
            font-size: 1.3rem;
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .music-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        @media (max-width: 480px) {
            section { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Music / 音楽</h1>
        <a href="index.html" class="back-link">← トップへ戻る</a>
    </header>

    <main>
        <img src="https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=800" alt="Musical Instrument" class="music-img">

        <section>
            <h2>音を紡ぎ、場を整える</h2>
            <p>私にとって音楽は、単に聴いて楽しむだけの受動的なものではなく、空間や表現をクリエイトするための大切な要素です。</p>
            <p>背景としてピアノやトランペットの演奏経験があり、そこから「音全般」への深い興味へと広がっていきました。これまでに、10人強のアンサンブルの編曲を手掛けたり、居合の大会において全体の緊張感と高揚感をコントロールする音響担当を務めたりといった活動も行っています。</p>
        </section>
    </main>
</body>
</html>
