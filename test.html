<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKE | Hitoshi's Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. 共通変数 & リセットCSS
           ========================================================================== */
        :root {
            --bg-color: #121212;        /* 漆黒・墨色 */
            --card-bg: #1c1c1c;         /* 薄い墨色 */
            --text-color: #e0e0e0;      /* 基本文字色 */
            --accent-gold: #c9a063;     /* 落ち着いたゴールド */
            --accent-red: #8b0000;      /* 差し色の朱赤・深紅 */
            --font-serif: 'Noto Serif JP', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-serif);
            line-height: 1.8;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        /* 全体のコンテンツフェードイン */
        .fade-in-content {
            opacity: 0;
            transform: translateY(20px);
            animation: page-reveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
        }

        @keyframes page-reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================================================
           2. ヘッダー & 戻るリンク
           ========================================================================== */
        header {
            padding: 60px 0 30px 0;
            width: 100%;
        }

        .back-link {
            font-size: 0.9rem;
            color: var(--accent-gold);
            display: inline-block;
            margin-bottom: 15px;
            position: relative;
            padding-bottom: 4px;
        }

        .back-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: var(--accent-gold);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .back-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        header h1 {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            margin-top: 10px;
        }

        header p {
            color: #888;
            font-size: 0.95rem;
            margin-top: 5px;
        }

        main {
            width: 100%;
            padding-bottom: 100px;
        }

        /* ==========================================================================
           3. 日本酒ログ リストスタイル
           ========================================================================== */
        .sake-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .sake-card {
            background-color: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-left: 3px solid var(--accent-gold);
            display: grid;
            grid-template-columns: 220px 1fr;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .sake-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-gold);
            border-left-color: var(--accent-red);
        }

        /* お酒の写真エリア */
        .sake-img-wrapper {
            width: 100%;
            height: 100%;
            min-height: 240px;
            overflow: hidden;
            background-color: #151515;
            position: relative;
        }

        .sake-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(105%);
            transition: transform 0.5s ease;
        }

        .sake-card:hover .sake-img {
            transform: scale(1.03);
        }

        /* お酒の情報エリア */
        .sake-content {
            padding: 25px 30px;
            display: flex;
            flex-direction: column;
            justify-content: top;
        }

        .sake-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .sake-date {
            font-size: 0.85rem;
            color: #777;
            letter-spacing: 0.05em;
        }

        .sake-name {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .sake-stars {
            color: var(--accent-gold);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .sake-description {
            font-size: 0.95rem;
            color: #bbbbbb;
            line-height: 1.8;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        /* 味わいパラメーター（オプション表示） */
        .sake-taste-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .taste-tag {
            font-size: 0.75rem;
            background-color: rgba(201, 160, 99, 0.1);
            color: var(--accent-gold);
            padding: 2px 10px;
            border: 1px solid rgba(201, 160, 99, 0.2);
            border-radius: 2px;
        }

        /* ==========================================================================
           4. レスポンシブ対応
           ========================================================================== */
        @media (max-width: 640px) {
            .sake-card {
                grid-template-columns: 1fr;
            }
            .sake-img-wrapper {
                height: 200px;
                min-height: auto;
            }
            .sake-content {
                padding: 20px;
            }
            .sake-header {
                flex-direction: column;
                gap: 5px;
            }
        }

        footer {
            margin-top: auto;
            padding: 30px 20px;
            color: #555;
            font-size: 0.8rem;
            text-align: center;
            width: 100vw;
            box-sizing: border-box;
            border-top: 1px solid #1a1a1a;
            background-color: #0d0d0d;
        }
    </style>
</head>
<body>

    <div class="fade-in-content">

        <header>
            <a href="index.html" class="back-link">← ポートフォリオに戻る</a>
            <h1>お酒 / SAKE</h1>
            <p>夫婦共通の趣味。美味しい料理と合わせて語り合う贅沢な時間と、一期一会の銘柄との出会い。</p>
        </header>

        <main>
            <div class="sake-list">

                <div class="sake-card">
                    <div class="sake-img-wrapper">
                        <img src="IMG_7568.png" alt="日本酒" class="sake-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div style="display:none; width:100%; height:100%; justify-content:center; align-items:center; color:#444; font-size:0.8rem;">[ 写真未設定 ]</div>
                    </div>
                    <div class="sake-content">
                        <div class="sake-header">
                            <h2 class="sake-name">一期一会の銘柄名</h2>
                            <span class="sake-stars">★★★★★</span>
                        </div>
                        <p class="sake-description">
                            ここに飲んだお酒の感想を書き込んでいきます。お酒のフルーティーさや辛口のキレ、一緒に合わせたお料理（お肉、お刺身、チーズなど）との相性、夫婦でどんな会話をして楽しんだかなどを都度都度書き足していくのに最適なスペースです。
                        </p>
                        <div class="sake-taste-tags">
                            <span class="taste-tag">薫酒 (フルーティー)</span>
                            <span class="taste-tag">すっきり</span>
                            <span class="taste-tag">料理に合う</span>
                        </div>
                        <div class="sake-header" style="border-bottom:none; margin-bottom:0; padding-bottom:0; margin-top:15px;">
                            <span></span>
                            <span class="sake-date">記録日: 2026.06.19</span>
                        </div>
                    </div>
                </div>
                </div>
        </main>

        <footer>
            &copy; 2026 Hitoshi. All Rights Reserved.
        </footer>

    </div>

</body>
</html>
